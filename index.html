<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set of Playing Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>set of playing cards</h1>
    <main class="table">
            <div class="card red-card">
            <!-- card elements = left, middle, right -->
             <div class="left">10</div>
             <div class="middle red-card">
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
                <div class="diamonds ten">♦</div>
             </div>
             <div class="right">10</div>
             </div>

             <div class="card">
            <!-- card elements = left, middle, right -->
             <div class="left">A</div>
             <div class="middle">
                <div>♠</div>
             </div>
             <div class="right">A</div>
             </div>

             <div class="card">
            <!-- card elements = left, middle, right -->
             <div class="left">2</div>
             <div class="middle">
                <div>♣</div>
                <div>♣</div>
             </div>
             <div class="right">2</div>
            </div>
    </main>
</body>
</html>
